name = "webhook-receiver"
account_id = "profile"
main = "src/index.ts"
compatibility_date = "2023-12-01"

[vars]
TRADE_WORKER_URL = "https://trade-worker.cryptolinx.workers.dev"
TELEGRAM_WORKER_URL = "https://telegram-worker.cryptolinx.workers.dev"
HA_WORKER_URL = "https://home-assistant-worker.<YOUR_DOMAIN>.workers.dev"

# Secrets managed via Cloudflare Secrets Store
secrets_store_secrets = [
  { binding = "WEBHOOK_API_KEY_BINDING", store_id = "<YOUR_STORE_ID>", secret_name = "WEBHOOK_API_SECRET_KEY" },
  { binding = "INTERNAL_KEY_BINDING",  store_id = "<YOUR_STORE_ID>", secret_name = "WEBHOOK_INTERNAL_KEY" },
  { binding = "HA_TOKEN_BINDING", store_id = "<YOUR_STORE_ID>", secret_name = "HA_TOKEN" }
]

[observability]
enabled = true

# Binding to the trade-worker for processing trading signals
[[services]]
binding = "TRADE_SERVICE" # Name used to access the trade-worker in code
service = "trade-worker"  # The name of the Cloudflare Worker service

# Binding to the telegram-worker for sending notifications
[[services]]
binding = "TELEGRAM_SERVICE" # Name used to access the telegram-worker in code
service = "telegram-worker"  # The name of the Cloudflare Worker service
