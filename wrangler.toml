name = "webhook-receiver"
account_id = "profile"
main = "src/index.js"
compatibility_date = "2023-12-01"

[vars]
TRADE_WORKER_URL = "https://trade-worker.cryptolinx.workers.dev"
TELEGRAM_WORKER_URL = "https://telegram-worker.cryptolinx.workers.dev"

# Secrets managed via Cloudflare Secrets Store
secrets_store_secrets = [
  { binding = "WEBHOOK_API_KEY_BINDING", store_id = "<YOUR_STORE_ID>", secret_name = "WEBHOOK_API_SECRET_KEY" },
  { binding = "INTERNAL_KEY_BINDING",  store_id = "<YOUR_STORE_ID>", secret_name = "WEBHOOK_INTERNAL_KEY" }
]

[observability]
enabled = true
